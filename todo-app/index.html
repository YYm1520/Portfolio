<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项</title>
<style>
:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #6c757d;
  --border: #dee2e6;
  --accent: #4361ee;
  --accent-hover: #3a56d4;
  --danger: #e63946;
  --danger-hover: #c1121f;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --input-bg: #ffffff;
  --hover-bg: #f0f2f5;
  --tag-bg: #e9ecef;
  --high: #e63946;
  --medium: #f4a261;
  --low: #2a9d8f;
  --expired: #fee2e2;
  --expired-border: #e63946;
  --overlay-bg: rgba(0,0,0,0.5);
  --modal-bg: #ffffff;
}

[data-theme="dark"] {
  --bg: #0d1117;
  --card: #161b22;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --border: #30363d;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --danger: #f85149;
  --danger-hover: #ff6b6b;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --input-bg: #0d1117;
  --hover-bg: #1c2333;
  --tag-bg: #21262d;
  --expired: #3d1114;
  --expired-border: #f85149;
  --overlay-bg: rgba(0,0,0,0.7);
  --modal-bg: #161b22;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.header h1 { font-size: 28px; font-weight: 700; }
.theme-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 18px; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

/* Stats */
.stats {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.stat-card {
  background: var(--card); border-radius: 10px; padding: 12px 16px;
  flex: 1; min-width: 100px; text-align: center; box-shadow: var(--shadow);
}
.stat-card .num { font-size: 24px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Input Area */
.add-form {
  background: var(--card); border-radius: 12px; padding: 16px;
  box-shadow: var(--shadow); margin-bottom: 16px;
}
.add-form .row { display: flex; gap: 8px; margin-bottom: 8px; }
.add-form .row:last-child { margin-bottom: 0; }
.add-form input[type="text"] {
  flex: 1; padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 14px; background: var(--input-bg);
  color: var(--text); outline: none; transition: border 0.2s;
}
.add-form input[type="text"]:focus { border-color: var(--accent); }
.add-form select, .add-form input[type="date"] {
  padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--input-bg); color: var(--text); outline: none;
  cursor: pointer;
}
.add-btn {
  padding: 10px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.add-btn:hover { background: var(--accent-hover); }

/* Toolbar */
.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  margin-bottom: 16px;
}
.toolbar input[type="text"] {
  flex: 1; min-width: 150px; padding: 8px 12px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 13px; background: var(--input-bg);
  color: var(--text); outline: none;
}
.toolbar input[type="text"]:focus { border-color: var(--accent); }
.toolbar select {
  padding: 8px 10px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--input-bg); color: var(--text); outline: none;
}
.filter-btns { display: flex; gap: 4px; }
.filter-btn {
  padding: 6px 12px; border: 2px solid var(--border); border-radius: 6px;
  background: var(--card); color: var(--text); font-size: 12px;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
}
.filter-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.clear-btn {
  padding: 6px 12px; border: 2px solid var(--danger); border-radius: 6px;
  background: transparent; color: var(--danger); font-size: 12px;
  cursor: pointer; transition: all 0.2s; font-weight: 500; margin-left: auto;
}
.clear-btn:hover { background: var(--danger); color: #fff; }

/* Category pills */
.category-pills {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
}
.pill {
  padding: 5px 14px; border-radius: 20px; border: 2px solid var(--border);
  background: var(--card); font-size: 12px; cursor: pointer; transition: all 0.2s;
  color: var(--text); font-weight: 500;
}
.pill.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.add-cat-btn {
  padding: 5px 12px; border-radius: 20px; border: 2px dashed var(--border);
  background: transparent; font-size: 14px; cursor: pointer; color: var(--text-secondary);
  transition: all 0.2s;
}
.add-cat-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Todo List */
.todo-list { display: flex; flex-direction: column; gap: 8px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
  background: var(--card); border-radius: 10px; box-shadow: var(--shadow);
  transition: all 0.2s; border-left: 4px solid transparent;
}
.todo-item:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.todo-item.expired { background: var(--expired); border-left-color: var(--expired-border); }
.todo-item.completed { opacity: 0.6; }
.todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }

.todo-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.todo-check:hover { border-color: var(--accent); }
.todo-check.checked { background: var(--accent); border-color: var(--accent); }
.todo-check.checked::after { content: '✓'; color: #fff; font-size: 13px; }

.todo-content { flex: 1; min-width: 0; }
.todo-text { font-size: 14px; word-break: break-word; margin-bottom: 6px; line-height: 1.5; }
.todo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.priority-badge {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff;
}
.priority-high { background: var(--high); }
.priority-medium { background: var(--medium); }
.priority-low { background: var(--low); }
.category-badge {
  padding: 2px 8px; border-radius: 4px; font-size: 11px;
  background: var(--tag-bg); color: var(--text-secondary);
}
.due-date { font-size: 11px; color: var(--text-secondary); }
.due-date.overdue { color: var(--expired-border); font-weight: 600; }

.todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
.todo-actions button {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; color: var(--text-secondary);
}
.todo-actions button:hover { background: var(--hover-bg); }
.todo-actions .delete-btn:hover { background: #fee2e2; color: var(--danger); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty .icon { font-size: 48px; margin-bottom: 12px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--overlay-bg); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--modal-bg); border-radius: 12px; padding: 24px;
  width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal h3 { margin-bottom: 16px; }
.modal input, .modal select {
  width: 100%; padding: 10px 12px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 14px; background: var(--input-bg);
  color: var(--text); outline: none; margin-bottom: 12px;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.modal-btns button {
  padding: 8px 20px; border-radius: 8px; font-size: 14px;
  cursor: pointer; font-weight: 500; border: none;
}
.modal-btns .cancel { background: var(--tag-bg); color: var(--text); }
.modal-btns .save { background: var(--accent); color: #fff; }

@media (max-width: 480px) {
  .header h1 { font-size: 22px; }
  .stats { gap: 8px; }
  .stat-card { padding: 10px 12px; }
  .stat-card .num { font-size: 20px; }
  .toolbar { gap: 6px; }
  .add-form .row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>待办事项</h1>
    <button class="theme-btn" id="themeToggle" title="切换主题">🌙</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">全部</div></div>
    <div class="stat-card"><div class="num" id="statActive">0</div><div class="label">待完成</div></div>
    <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
    <div class="stat-card"><div class="num" id="statOverdue">0</div><div class="label">已过期</div></div>
  </div>

  <div class="add-form">
    <div class="row">
      <input type="text" id="newTodo" placeholder="添加新的待办事项..." autocomplete="off">
      <button class="add-btn" id="addBtn">添加</button>
    </div>
    <div class="row">
      <select id="newPriority">
        <option value="medium">中优先级</option>
        <option value="high">高优先级</option>
        <option value="low">低优先级</option>
      </select>
      <select id="newCategory"></select>
      <input type="date" id="newDue">
    </div>
  </div>

  <div class="category-pills" id="categoryPills"></div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索...">
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">待完成</button>
      <button class="filter-btn" data-filter="done">已完成</button>
    </div>
    <button class="clear-btn" id="clearDone">清除已完成</button>
  </div>

  <div class="todo-list" id="todoList"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>编辑待办</h3>
    <input type="text" id="editText" placeholder="内容">
    <select id="editPriority">
      <option value="high">高优先级</option>
      <option value="medium">中优先级</option>
      <option value="low">低优先级</option>
    </select>
    <select id="editCategory"></select>
    <input type="date" id="editDue">
    <div class="modal-btns">
      <button class="cancel" onclick="closeEditModal()">取消</button>
      <button class="save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h3>添加分类</h3>
    <input type="text" id="catName" placeholder="分类名称">
    <div class="modal-btns">
      <button class="cancel" onclick="closeCatModal()">取消</button>
      <button class="save" onclick="addCategory()">添加</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'todo-app-data';
const THEME_KEY = 'todo-app-theme';
const DEFAULT_CATS = ['全部', '工作', '生活', '学习'];
const PRIORITY_LABELS = { high: '高', medium: '中', low: '低' };

let todos = [];
let categories = [];
let activeCategory = '全部';
let activeFilter = 'all';
let searchQuery = '';
let editingId = null;

// --- Storage ---
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : { todos: [], categories: [...DEFAULT_CATS] };
    todos = data.todos || [];
    categories = data.categories || [...DEFAULT_CATS];
    const theme = localStorage.getItem(THEME_KEY);
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').textContent = '☀️';
    }
  } catch { todos = []; categories = [...DEFAULT_CATS]; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ todos, categories }));
}

// --- ID ---
let nextId = Date.now();
function genId() { return nextId++; }

// --- CRUD ---
function addTodo() {
  const input = document.getElementById('newTodo');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({
    id: genId(),
    text,
    completed: false,
    priority: document.getElementById('newPriority').value,
    category: document.getElementById('newCategory').value || '生活',
    due: document.getElementById('newDue').value || '',
    createdAt: Date.now(),
  });
  input.value = '';
  save(); render();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) t.completed = !t.completed;
  save(); render();
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  save(); render();
}

function openEditModal(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('editText').value = t.text;
  document.getElementById('editPriority').value = t.priority;
  document.getElementById('editDue').value = t.due;
  populateCatSelect('editCategory', t.category);
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
  editingId = null;
}

function saveEdit() {
  const t = todos.find(t => t.id === editingId);
  if (!t) return;
  const text = document.getElementById('editText').value.trim();
  if (!text) return;
  t.text = text;
  t.priority = document.getElementById('editPriority').value;
  t.category = document.getElementById('editCategory').value;
  t.due = document.getElementById('editDue').value;
  closeEditModal();
  save(); render();
}

function clearCompleted() {
  todos = todos.filter(t => !t.completed);
  save(); render();
}

// --- Categories ---
function populateCatSelect(selectId, selected) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';
  categories.filter(c => c !== '全部').forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderCategoryPills() {
  const container = document.getElementById('categoryPills');
  container.innerHTML = '';
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (c === activeCategory ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { activeCategory = c; render(); };
    container.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-cat-btn';
  addBtn.textContent = '+';
  addBtn.onclick = openCatModal;
  container.appendChild(addBtn);
}

function openCatModal() { document.getElementById('catModal').classList.add('show'); }
function closeCatModal() { document.getElementById('catModal').classList.remove('show'); document.getElementById('catName').value = ''; }

function addCategory() {
  const name = document.getElementById('catName').value.trim();
  if (!name || categories.includes(name)) { closeCatModal(); return; }
  categories.push(name);
  closeCatModal();
  save(); render();
}

// --- Filtering ---
function getFiltered() {
  let list = todos;
  if (activeCategory !== '全部') list = list.filter(t => t.category === activeCategory);
  if (activeFilter === 'active') list = list.filter(t => !t.completed);
  if (activeFilter === 'done') list = list.filter(t => t.completed);
  if (searchQuery) list = list.filter(t => t.text.toLowerCase().includes(searchQuery.toLowerCase()));
  return list;
}

// --- Helpers ---
function isOverdue(due) {
  if (!due) return false;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return new Date(due) < today;
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getMonth() + 1}月${date.getDate()}日`;
}

// --- Render ---
function render() {
  const list = getFiltered();
  const container = document.getElementById('todoList');

  if (list.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div><div>暂无待办事项</div></div>';
  } else {
    container.innerHTML = list.map(t => {
      const overdue = !t.completed && isOverdue(t.due);
      const expiredClass = overdue ? ' expired' : '';
      const doneClass = t.completed ? ' completed' : '';
      return `
        <div class="todo-item${expiredClass}${doneClass}">
          <div class="todo-check${t.completed ? ' checked' : ''}" onclick="toggleTodo(${t.id})"></div>
          <div class="todo-content">
            <div class="todo-text">${escapeHtml(t.text)}</div>
            <div class="todo-meta">
              <span class="priority-badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>
              <span class="category-badge">${escapeHtml(t.category)}</span>
              ${t.due ? `<span class="due-date${overdue ? ' overdue' : ''}">📅 ${formatDate(t.due)}${overdue ? ' (已过期)' : ''}</span>` : ''}
            </div>
          </div>
          <div class="todo-actions">
            <button onclick="openEditModal(${t.id})" title="编辑">✏️</button>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="删除">🗑️</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Stats
  const allActive = todos.filter(t => !t.completed);
  const allDone = todos.filter(t => t.completed);
  const allOverdue = todos.filter(t => !t.completed && isOverdue(t.due));
  document.getElementById('statTotal').textContent = todos.length;
  document.getElementById('statActive').textContent = allActive.length;
  document.getElementById('statDone').textContent = allDone.length;
  document.getElementById('statOverdue').textContent = allOverdue.length;

  renderCategoryPills();
  populateCatSelect('newCategory', activeCategory === '全部' ? '生活' : activeCategory);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Events ---
document.getElementById('addBtn').addEventListener('click', addTodo);
document.getElementById('newTodo').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.getElementById('clearDone').addEventListener('click', clearCompleted);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem(THEME_KEY, isDark ? '' : 'dark');
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('show');
      editingId = null;
    }
  });
});

// --- Init ---
load(); render();
</script>
</body>
</html>
